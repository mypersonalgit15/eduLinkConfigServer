springdoc:
  swagger-ui:
    urls:
      - name: IAM-Service
        url: /appUser/v3/api-docs
      - name: Student-Service
        url: /student/v3/api-docs
      - name: Faculty-Service
        url: /faculty/v3/api-docs
      - name: Course-Service
        url: /course/v3/api-docs
      - name: Enrollment-Service
        url: /faculty-course-assignment/v3/api-docs
      - name: Engagement-Service
        url: /attendance/v3/api-docs
      - name: Academic-Service
        url: /grade/v3/api-docs
server:
  port: 8081
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: iam-service
          uri: lb://IAM-SERVICE
          predicates:
            - Path=/appUser/**
          filters:
            - name: Retry
              args:
                retries: 1

        - id: student-service
          uri: lb://STUDENT-SERVICE
          predicates:
            - Path=/student/**
          filters:
            - name: Retry
              args:
                retries: 1
                
        - id: faculty-service
          uri: lb://FACULTY-SERVICE
          predicates:
            - Path=/faculty/**
          filters:
            - name: Retry
              args:
                retries: 1
                
        - id: course-service
          uri: lb://COURSE-SERVICE
          predicates:
            - Path=/course/**, /learningMaterial/**
          filters:
            - name: Retry
              args:
                retries: 1

        - id: enrollment-service
          uri: lb://ENROLLMENT-SERVICE
          predicates:
            - Path=/faculty-course-assignment/**, /student-course-assignment/**
          filters:
            - name: Retry
              args:
                retries: 1

        - id: engagement-service
          uri: lb://ENGAGEMENT-SERVICE
          predicates:
            - Path=/attendance/**, /feedback/**
          filters:
            - name: Retry
              args:
                retries: 1

        - id: academic-service
          uri: lb://ACADEMIC-SERVICE
          predicates:
            - Path=/grade/**, /exam/**, /assignment/**
          filters:
            - name: Retry
              args:
                retries: 1
eureka:
  instance:
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 60
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.cloud.client.ip-address}:${random.value}
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
