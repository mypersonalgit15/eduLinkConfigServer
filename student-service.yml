management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
springdoc:
  api-docs:
    path: /v3/api-docs
server:
  forward-headers-strategy: framework
  port: 0
logging:
  level:
    root: INFO
    org.hibernate: WARN
    org.hibernate.engine.jdbc.connections.internal.DriverManagerConnectionProviderImpl: WARN
spring:
  application:
    name: student-service
  datasource:
    url: jdbc:mysql://localhost:3306/student_service
    username: ${username}
    password: ${password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
  cloud:
    loadbalancer:
      configuration: round_robin
eureka:
  instance:
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 60
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.cloud.client.ip-address}:${random.value}
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka


resilience4j:
  retry:
    instances:
      registerStudent:
        max-attempts: 3
        wait-duration: 2s
  circuitbreaker:
    instance:
      registerStudent:
        sliding-window-size: 5
        minimum-number-calls: 5
        failure-rate-threshould: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 2

feign:
  client:
    config:
      default:
        connectTimeout: 3000
        readTimeout: 5000
